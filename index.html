<!DOCTYPE html>
<html dir="ltr" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ShadMini Code - محرر الهواتف الاحترافي</title>
  <!-- Monaco Editor -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
  <!-- VS Code Codicons (أيقونات حقيقية من مايكروسوفت) -->
  <link href="https://unpkg.com/@vscode/codicons@0.0.35/dist/codicon.css" rel="stylesheet">
  <!-- isomorphic-git و lightning-fs للعمل مع Git حقيقياً -->
  <script src="https://unpkg.com/isomorphic-git@1.25.0/index.umd.js"></script>
  <script src="https://unpkg.com/lightning-fs@2.0.0"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0e0e12;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #e9e9e9;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    /* Sidebar */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 250px;
      background: #18181b;
      border-right: 1px solid #2e2e32;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 8px;
      background: #141416;
      border-bottom: 1px solid #2e2e32;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-tabs {
      display: flex;
      background: #18181b;
    }
    .sidebar-tab {
      padding: 8px 12px;
      cursor: pointer;
      background: #18181b;
      border-bottom: 2px solid transparent;
    }
    .sidebar-tab.active {
      background: #0e0e12;
      border-bottom-color: #0078d4;
    }
    .sidebar-content {
      flex: 1;
      overflow: hidden;
    }
    .panel {
      display: none;
      height: 100%;
      overflow: auto;
    }
    .panel.active {
      display: block;
    }
    .explorer-tree {
      padding: 8px;
    }
    .tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 4px;
    }
    .tree-item:hover {
      background: #2e2e32;
    }
    .tree-item.expanded .tree-children {
      display: block;
    }
    .tree-children {
      display: none;
      margin-left: 16px;
    }
    .terminal {
      background: #0e0e12;
      color: #e9e9e9;
      font-family: monospace;
      padding: 8px;
      height: 200px;
      overflow: auto;
      border-top: 1px solid #2e2e32;
    }
    .search-panel {
      padding: 8px;
    }
    .search-input {
      width: 100%;
      padding: 4px;
      background: #1e1e22;
      border: 1px solid #3e3e42;
      color: #e9e9e9;
      border-radius: 4px;
    }
    /* شريط القوائم بأسلوب VS Code */
    .menu-bar {
      background: #18181b;
      padding: 6px 12px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      border-bottom: 1px solid #2e2e32;
    }
    .menu-item {
      position: relative;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .menu-item:hover { background: #2e2e32; }
    .menu-dropdown {
      position: absolute;
      top: 28px;
      left: 0;
      background: #1e1e22;
      backdrop-filter: blur(12px);
      min-width: 200px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      z-index: 100;
      border: 1px solid #3e3e42;
    }
    .menu-item:hover .menu-dropdown { display: flex; }
    .menu-dropdown a {
      padding: 8px 16px;
      color: #ddd;
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .menu-dropdown a:hover { background: #0078d4; color: white; }
    /* التبويبات */
    .tabs-container {
      background: #141416;
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid #2e2e32;
      padding-left: 8px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1e1e22;
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      background: #0e0e12;
      border-bottom-color: #0078d4;
      color: white;
    }
    .tab-close {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 14px;
    }
    /* تخطيط رئيسي */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 48px;
      background: #18181b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 16px;
      gap: 20px;
      border-right: 1px solid #2e2e32;
    }
    .sidebar-icon {
      font-size: 22px;
      cursor: pointer;
      color: #aaa;
      transition: 0.1s;
    }
    .sidebar-icon:hover { color: #0078d4; }
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .editor-toolbar {
      background: #1e1e22;
      padding: 6px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #2e2e32;
    }
    .editor-toolbar select, .editor-toolbar button {
      background: #2e2e32;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      color: white;
      font-size: 12px;
    }
    .editor-wrapper { flex: 1; overflow: auto; }
    .CodeMirror { height: 100%; font-family: 'Fira Code', monospace; font-size: 15px; }
    .statusbar {
      background: #18181b;
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      border-top: 1px solid #2e2e32;
    }
    .floating-panel {
      position: fixed;
      top: 20%;
      right: 16px;
      width: 280px;
      background: #1e1e22;
      border-radius: 12px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 200;
      border: 1px solid #3e3e42;
      box-shadow: 0 12px 28px black;
    }
    .floating-panel input, .floating-panel button {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }
    .floating-panel button {
      background: #0078d4;
      color: white;
    }
    i[class^="codicon-"] { font-size: 18px; vertical-align: middle; }
  </style>
</head>
<body>
<div class="app">
  <div class="menu-bar">
    <div class="menu-item">ملف
      <div class="menu-dropdown"><a id="menu-new"><i class="codicon codicon-new-file"></i> جديد</a>
      <a id="menu-open"><i class="codicon codicon-folder-opened"></i> فتح ملف</a>
      <a id="menu-save"><i class="codicon codicon-save"></i> حفظ</a>
      <a id="menu-git-clone"><i class="codicon codicon-git-clone"></i> استنساخ من GitHub</a></div>
    </div>
    <div class="menu-item">تعديل
      <div class="menu-dropdown"><a id="menu-undo"><i class="codicon codicon-discard"></i> تراجع</a>
      <a id="menu-redo"><i class="codicon codicon-redo"></i> إعادة</a>
      <a id="menu-find"><i class="codicon codicon-search"></i> بحث</a></div>
    </div>
    <div class="menu-item">عرض
      <div class="menu-dropdown"><a id="font-inc"><i class="codicon codicon-zoom-in"></i> تكبير الخط</a>
      <a id="font-dec"><i class="codicon codicon-zoom-out"></i> تصغير الخط</a></div>
    </div>
  </div>

  <div class="tabs-container" id="tabsContainer"></div>
  
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-panel="explorer"><i class="codicon codicon-files"></i></div>
        <div class="sidebar-tab" data-panel="search"><i class="codicon codicon-search"></i></div>
        <div class="sidebar-tab" data-panel="git"><i class="codicon codicon-git-branch"></i></div>
        <div class="sidebar-tab" data-panel="extensions"><i class="codicon codicon-extensions"></i></div>
        <div class="sidebar-tab" data-panel="terminal"><i class="codicon codicon-terminal"></i></div>
      </div>
      <div class="sidebar-content">
        <div id="explorer-panel" class="panel active">
          <div class="explorer-tree">
            <div class="tree-item" onclick="toggleFolder(this)">
              <i class="codicon codicon-folder"></i> project
              <div class="tree-children">
                <div class="tree-item" onclick="openFile('index.html')">
                  <i class="codicon codicon-file"></i> index.html
                </div>
                <div class="tree-item" onclick="openFile('script.js')">
                  <i class="codicon codicon-file"></i> script.js
                </div>
                <div class="tree-item" onclick="openFile('style.css')">
                  <i class="codicon codicon-file"></i> style.css
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="search-panel" class="panel">
          <input type="text" class="search-input" placeholder="بحث في الملفات">
          <div id="search-results"></div>
        </div>
        <div id="git-panel" class="panel">
          <button id="git-init">تهيئة Git</button>
          <button id="git-commit">تأكيد</button>
          <button id="git-push">رفع</button>
        </div>
        <div id="extensions-panel" class="panel">
          <p>إضافات (قريباً)</p>
        </div>
        <div id="terminal-panel" class="panel">
          <div class="terminal" id="terminal-output">Terminal ready<br>$ </div>
          <input type="text" id="terminal-input" placeholder="أمر">
        </div>
      </div>
    </div>
    <div class="editor-panel">
      <div class="editor-toolbar">
        <select id="langSelect">
          <option>javascript</option><option>python</option><option>html</option><option>css</option>
          <option>cpp</option><option>java</option><option>go</option><option>rust</option>
        </select>
        <button id="manualSaveBtn"><i class="codicon codicon-save"></i> حفظ</button>
        <span id="autoSaveStatus">حفظ تلقائي</span>
      </div>
      <div class="editor-wrapper" id="editorWrapper"><textarea id="codeEditor">// ShadMini Code - ابدأ كتابة كودك</textarea></div>
    </div>
  </div>
  <div class="statusbar"><span id="langStatus">javascript</span><span id="gitStatus"><i class="codicon codicon-github"></i> غير متصل</span></div>
</div>

<div id="githubPanel" class="floating-panel">
  <input type="text" id="repoUrl" placeholder="رابط المستودع (HTTPS)" value="https://github.com/octocat/Hello-World">
  <button id="cloneRealBtn">استنساخ حقيقي</button>
  <button id="commitBtn">تأكيد (commit)</button>
  <button id="pushBtn">رفع (push)</button>
  <button id="closeGitPanel">إغلاق</button>
  <div id="gitLog" style="font-size:11px; color:#aaa;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/search.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.css">

<script>
  // ---------- Core Editor + Tabs + AutoSave ----------
  let editor, activeTabId = null, tabs = [];
  let currentFs = null, currentGitDir = null;  // لنظام الملفات للمستودع المستنسخ

  const langMode = { javascript:'javascript', python:'python', html:'htmlmixed', css:'css', cpp:'clike', java:'clike', go:'go', rust:'rust' };
  let autoSaveTimer = null;
  const DB_NAME = 'ShadMiniV2';

  async function openDB() { return new Promise((resolve)=> { let req=indexedDB.open(DB_NAME,1); req.onupgradeneeded=()=>req.result.createObjectStore('tabs'); req.onsuccess=()=>resolve(req.result); }); }
  async function saveTabs() { if(!tabs.length) return; let db=await openDB(); let tx=db.transaction('tabs','readwrite'); tx.objectStore('tabs').put(JSON.stringify(tabs),'data'); db.close(); document.getElementById('autoSaveStatus').innerHTML='✓ حفظ'; setTimeout(()=>document.getElementById('autoSaveStatus').innerHTML='حفظ تلقائي',1200); }
  async function loadTabs() { let db=await openDB(); let val=await new Promise(r=>{ let req=db.transaction('tabs').objectStore('tabs').get('data'); req.onsuccess=()=>r(req.result); }); db.close(); return val?JSON.parse(val):null; }

  function triggerAutoSave() { if(autoSaveTimer) clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(()=>{ if(activeTabId && editor) { let tab=tabs.find(t=>t.id==activeTabId); if(tab) tab.content=editor.getValue(); saveTabs(); } },1500); }

  function renderTabs() { let container=document.getElementById('tabsContainer'); container.innerHTML=''; tabs.forEach(tab=>{ let div=document.createElement('div'); div.className=`tab ${activeTabId===tab.id?'active':''}`; div.innerHTML=`<span>${tab.name}${tab.modified?'*':''}</span><button class="tab-close"><i class="codicon codicon-close"></i></button>`; div.querySelector('.tab-close').onclick=(e)=>{ e.stopPropagation(); closeTab(tab.id); }; div.onclick=()=>switchToTab(tab.id); container.appendChild(div); }); let newBtn=document.createElement('button'); newBtn.innerHTML='<i class="codicon codicon-plus"></i>'; newBtn.className='new-tab-btn'; newBtn.onclick=()=>createNewTab(); container.appendChild(newBtn); }

  async function createNewTab(content='',name='new',lang='javascript') { let id=Date.now(); if(!content) content='// اكتب كودك هنا'; tabs.push({id,name:name.endsWith('.js')?name:name+'.'+lang,content,language:lang,modified:false}); renderTabs(); switchToTab(id); triggerAutoSave(); }

  async function switchToTab(id) { if(activeTabId && editor){ let old=tabs.find(t=>t.id==activeTabId); if(old) old.content=editor.getValue(); } activeTabId=id; let tab=tabs.find(t=>t.id==id); if(!tab) return; document.getElementById('editorWrapper').innerHTML='<textarea id="codeEditor"></textarea>'; let textarea=document.getElementById('codeEditor'); if(editor) editor.toTextArea(); editor=CodeMirror.fromTextArea(textarea,{lineNumbers:true,theme:'dracula',mode:langMode[tab.language]||'javascript',autoCloseBrackets:true,matchBrackets:true,foldGutter:true,gutters:["CodeMirror-linenumbers","CodeMirror-foldgutter"],extraKeys:{"Ctrl-S":()=>{saveCurrentTab();}}}); editor.setValue(tab.content); editor.on('change',()=>{ let cur=tabs.find(t=>t.id==activeTabId); if(cur){ cur.content=editor.getValue(); cur.modified=true; triggerAutoSave(); renderTabs(); } }); document.getElementById('langSelect').value=tab.language; document.getElementById('langStatus').innerText=tab.language; renderTabs(); }

  function saveCurrentTab() { if(activeTabId && editor){ let tab=tabs.find(t=>t.id==activeTabId); if(tab) tab.content=editor.getValue(); saveTabs(); document.getElementById('autoSaveStatus').innerHTML='✔ حفظ يدوي'; setTimeout(()=>document.getElementById('autoSaveStatus').innerHTML='حفظ تلقائي',1000); } }
  function closeTab(id) { let idx=tabs.findIndex(t=>t.id==id); if(idx!==-1) tabs.splice(idx,1); if(tabs.length===0) createNewTab('// بداية جديدة','main','javascript'); if(activeTabId===id) activeTabId=tabs[0]?.id; if(activeTabId) switchToTab(activeTabId); renderTabs(); saveTabs(); }

  // ---------- GitHub REAL (clone, commit, push) باستخدام isomorphic-git ----------
  let gitToken = null; // سيطلب من المستخدم إدخال token (للبساطة سنطلبه عبر prompt)
  async function getGitToken() { if(gitToken) return gitToken; let token = prompt("أدخل GitHub Personal Access Token (classic) مع صلاحيات repo",""); if(token) gitToken=token; return gitToken; }

  async function realClone() { let url = document.getElementById('repoUrl').value; let repoName = url.split('/').pop().replace('.git',''); document.getElementById('gitLog').innerText='جارٍ الاستنساخ...'; let fs = new LightningFS('fs'); let dir = '/'+repoName; await fs.promises.mkdir(dir); await git.clone({ fs, http: git.http, dir, url, corsProxy: 'https://cors.isomorphic-git.org', depth: 1 }); currentFs = fs; currentGitDir = dir; document.getElementById('gitStatus').innerHTML='<i class="codicon codicon-github"></i> متصل: '+repoName; document.getElementById('gitLog').innerText='تم استنساخ '+repoName; // فتح الملف الرئيسي (مثال) 
    let files = await fs.promises.readdir(dir); let mainFile = files.find(f=>f.endsWith('.js')||f.endsWith('.py')||f.endsWith('.md')); if(mainFile){ let content = await fs.promises.readFile(dir+'/'+mainFile,'utf8'); createNewTab(content, mainFile, 'javascript'); } 
  }

  async function realCommit() { if(!currentFs || !currentGitDir) { alert('لا يوجد مستودع مستنسخ'); return; } let token = await getGitToken(); if(!token) return; await git.add({ fs: currentFs, dir: currentGitDir, filepath: '.' }); await git.commit({ fs: currentFs, dir: currentGitDir, message: 'تحديث من ShadMini Code', author: { name: 'ShadMini', email: 'mobile@shadmini.com' } }); document.getElementById('gitLog').innerText='تم التأكيد محلياً'; }

  async function realPush() { if(!currentFs || !currentGitDir) return; let token = await getGitToken(); await git.push({ fs: currentFs, dir: currentGitDir, remote: 'origin', ref: 'main', onAuth: () => ({ username: token, password: 'x-oauth-basic' }), corsProxy: 'https://cors.isomorphic-git.org' }); document.getElementById('gitLog').innerText='تم الرفع إلى GitHub'; }

  // ---------- أحداث الواجهة ----------
  window.onload = async()=>{ let saved = await loadTabs(); if(saved && saved.length) { tabs=saved; activeTabId=tabs[0].id; } else { createNewTab('// Hello from ShadMini Code\nconsole.log("جاهز");','hello.js','javascript'); } renderTabs(); switchToTab(activeTabId); };
  document.getElementById('menu-new').onclick=()=>createNewTab(); document.getElementById('menu-open').onclick=()=>{ let input=document.createElement('input'); input.type='file'; input.onchange=async(e)=>{ let file=e.target.files[0]; let text=await file.text(); let ext=file.name.split('.').pop(); let lang='javascript'; if(ext=='py') lang='python'; else if(ext=='html') lang='html'; else if(ext=='css') lang='css'; createNewTab(text,file.name,lang); }; input.click(); };
  document.getElementById('menu-save').onclick=()=>saveCurrentTab();
  document.getElementById('menu-git-clone').onclick=()=>document.getElementById('githubPanel').style.display='flex';
  document.getElementById('closeGitPanel').onclick=()=>document.getElementById('githubPanel').style.display='none';
  document.getElementById('cloneRealBtn').onclick=()=>realClone();
  document.getElementById('commitBtn').onclick=()=>realCommit();
  document.getElementById('pushBtn').onclick=()=>realPush();
  document.getElementById('menu-undo').onclick=()=>editor.undo();
  document.getElementById('menu-redo').onclick=()=>editor.redo();
  document.getElementById('menu-find').onclick=()=>editor.execCommand("find");
  document.getElementById('font-inc').onclick=()=>{ let cur=parseInt(getComputedStyle(document.querySelector('.CodeMirror')).fontSize); document.querySelector('.CodeMirror').style.fontSize=(cur+2)+'px'; };
  document.getElementById('font-dec').onclick=()=>{ let cur=parseInt(getComputedStyle(document.querySelector('.CodeMirror')).fontSize); document.querySelector('.CodeMirror').style.fontSize=Math.max(10,cur-2)+'px'; };
  document.getElementById('manualSaveBtn').onclick=()=>saveCurrentTab();
  document.getElementById('langSelect').onchange=(e)=>{ let lang=e.target.value; let tab=tabs.find(t=>t.id==activeTabId); if(tab){ tab.language=lang; editor.setOption('mode',langMode[lang]||'javascript'); document.getElementById('langStatus').innerText=lang; triggerAutoSave(); renderTabs(); } };
  document.getElementById('gitSidebarBtn').onclick=()=>document.getElementById('githubPanel').style.display='flex';
</script>
</body>
</html>
