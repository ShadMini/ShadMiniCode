<!DOCTYPE html>
<html dir="ltr" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ShadMini Code - محرر الأكواد</title>
  
  <!-- CodeMirror CSS (ثيم VS Code Dark) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  
  <!-- لغات CodeMirror (سنحمّل الأساسية فقط) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css">
  
  <link rel="stylesheet" href="style.css">
</head>

<div class="app-container">
    <div class="menu-bar">
        <div class="menu-item">ملف
            <div class="menu-dropdown">
                <a id="menu-new">جديد</a>
                <a id="menu-open">فتح ملف</a>
                <a id="menu-save">حفظ</a>
                <a id="menu-save-as">حفظ باسم</a>
                <a id="menu-github-clone">استنساخ من GitHub</a>
                <a id="menu-exit">خروج</a>
            </div>
        </div>
        <div class="menu-item">تعديل
            <div class="menu-dropdown">
                <a id="menu-undo">تراجع</a>
                <a id="menu-redo">إعادة</a>
                <a id="menu-find">بحث</a>
            </div>
        </div>
        <div class="menu-item">عرض
            <div class="menu-dropdown">
                <a id="menu-toggle-sidebar">إخفاء/إظهار الشريط الجانبي</a>
                <a id="menu-inc-font">تكبير الخط</a>
                <a id="menu-dec-font">تصغير الخط</a>
            </div>
        </div>
        <div class="menu-item">مساعدة
            <div class="menu-dropdown">
                <a id="menu-about">عن ShadMini Code</a>
            </div>
        </div>
    </div>
    <div class="tabs-bar" id="tabsContainer"></div>
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-icon" data-view="files">📁</div>
            <div class="sidebar-icon" data-view="github">🐙</div>
            <div class="sidebar-icon" data-view="settings">⚙️</div>
        </div>
        <div class="editor-wrapper" id="editorContainer"></div>
        <div id="githubPanel" style="display: none; width: 250px; background: #252526; padding: 10px;">
            <input type="text" id="repoUrl" placeholder="رابط المستودع" style="width:100%">
            <button id="cloneRepo">استنساخ</button>
            <button id="commitRepo">تأكيد التغييرات</button>
            <button id="pushRepo">دفع إلى GitHub</button>
        </div>
    </div>
    <div class="status-bar"><span id="statusMsg"></span></div>
</div>

  
  <!-- CodeMirror scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <!-- إضافة دعم اللغات -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  
  <!-- إضافات مفيدة (طي الأكواد، البحث، إلخ) اختياري -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://unpkg.com/isomorphic-git@1.24.1/index.umd.js"></script>
<script src="https://unpkg.com/lightning-fs@2.0.0"></script>
  <script src="script.js"></script>
</body>
</html>
