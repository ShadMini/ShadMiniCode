<!DOCTYPE html>
<html dir="ltr" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ShadMini Code - محرر احترافي للهواتف</title>
  <!-- CodeMirror CSS + Themes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css">
  <!-- Font Awesome 6 (مجاني) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* تحسين اللمس */
    }

    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* الحاوية الرئيسية */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e2e;
      color: #e0e0e0;
    }

    /* شريط القوائم المنسدلة - حديث */
    .menu-bar {
      background: #15161e;
      padding: 6px 12px;
      display: flex;
      gap: 20px;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid #2a2b36;
    }
    .menu-item {
      position: relative;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: 0.1s;
    }
    .menu-item:hover {
      background: #2a2b36;
    }
    .menu-dropdown {
      position: absolute;
      top: 28px;
      left: 0;
      background: #1e1f2c;
      backdrop-filter: blur(10px);
      min-width: 200px;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      z-index: 1000;
      border: 1px solid #3a3b45;
      overflow: hidden;
    }
    .menu-item:hover .menu-dropdown {
      display: flex;
    }
    .menu-dropdown a {
      padding: 10px 16px;
      color: #ddd;
      text-decoration: none;
      font-size: 13px;
      transition: 0.05s linear;
      border-bottom: 1px solid #2a2b36;
    }
    .menu-dropdown a:hover {
      background: #0078d4;
      color: white;
    }

    /* التبويبات - عصرية */
    .tabs-container {
      background: #13141c;
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      border-bottom: 1px solid #2a2b36;
      padding-left: 8px;
      gap: 2px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1e1f2c;
      color: #aaa;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      cursor: pointer;
      transition: 0.1s;
      border-bottom: 2px solid transparent;
      font-size: 13px;
    }
    .tab.active {
      background: #1e1e2e;
      color: white;
      border-bottom-color: #0078d4;
    }
    .tab .tab-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      border-radius: 4px;
    }
    .tab .tab-close:hover {
      background: #ff4d4d20;
      color: #ff7b7b;
    }
    .new-tab-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      padding: 0 12px;
      cursor: pointer;
    }

    /* التخطيط الرئيسي شريط جانبي + محرر */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 56px;
      background: #15161e;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-top: 20px;
      border-right: 1px solid #2a2b36;
    }
    .sidebar-icon {
      font-size: 24px;
      color: #aaa;
      cursor: pointer;
      transition: 0.1s;
      padding: 8px;
      border-radius: 12px;
    }
    .sidebar-icon:hover, .sidebar-icon.active {
      color: #0078d4;
      background: #2a2b36;
    }
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-toolbar {
      background: #1e1f2c;
      padding: 6px 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #2a2b36;
    }
    .editor-toolbar select, .editor-toolbar button {
      background: #2a2b36;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }
    .editor-wrapper {
      flex: 1;
      overflow: auto;
    }
    .CodeMirror {
      height: 100%;
      font-size: 16px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
    }
    .statusbar {
      background: #15161e;
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      border-top: 1px solid #2a2b36;
    }

    /* لوحة GitHub المنبثقة */
    .floating-panel {
      position: fixed;
      top: 20%;
      right: 20px;
      width: 280px;
      background: #1e1f2c;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 35px black;
      border: 1px solid #3a3b45;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 2000;
    }
    .floating-panel input, .floating-panel button {
      padding: 8px;
      border-radius: 10px;
      border: none;
    }
    .floating-panel button {
      background: #0078d4;
      color: white;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="menu-bar">
    <div class="menu-item">ملف
      <div class="menu-dropdown">
        <a id="menu-new">جديد ملف</a>
        <a id="menu-open">فتح ملف محلي</a>
        <a id="menu-save">حفظ (Ctrl+S)</a>
        <a id="menu-github">اتصال GitHub</a>
      </div>
    </div>
    <div class="menu-item">تعديل
      <div class="menu-dropdown">
        <a id="menu-undo">تراجع</a>
        <a id="menu-redo">إعادة</a>
        <a id="menu-find">بحث (Ctrl+F)</a>
      </div>
    </div>
    <div class="menu-item">عرض
      <div class="menu-dropdown">
        <a id="menu-font-inc">زيادة الخط</a>
        <a id="menu-font-dec">إنقاص الخط</a>
      </div>
    </div>
  </div>
  
  <div class="tabs-container" id="tabsContainer"></div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-icon" data-panel="explorer"><i class="fas fa-folder-open"></i></div>
      <div class="sidebar-icon" data-panel="github"><i class="fab fa-github"></i></div>
      <div class="sidebar-icon" data-panel="settings"><i class="fas fa-cog"></i></div>
    </div>
    <div class="editor-panel">
      <div class="editor-toolbar">
        <select id="languageSwitcher">
          <option value="javascript">JavaScript</option><option value="python">Python</option><option value="html">HTML</option>
          <option value="css">CSS</option><option value="cpp">C++</option><option value="java">Java</option>
          <option value="csharp">C#</option><option value="go">Go</option><option value="ruby">Ruby</option>
          <option value="rust">Rust</option><option value="json">JSON</option><option value="markdown">Markdown</option>
        </select>
        <button id="saveBtn"><i class="fas fa-save"></i> حفظ</button>
        <span id="autoSaveStatus">💾 حفظ تلقائي</span>
      </div>
      <div class="editor-wrapper" id="editorWrapper">
        <textarea id="codeEditor">// مرحباً بك في ShadMini Code - اكتب كودك هنا</textarea>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <span id="statusLang">JavaScript</span>
    <span id="statusSaved">&#10004; تم الحفظ</span>
    <span id="githubStatus"><i class="fab fa-github"></i> غير متصل</span>
  </div>
</div>

<!-- لوحة GitHub المنبثقة -->
<div id="githubPanel" class="floating-panel">
  <input type="text" id="repoUrlInput" placeholder="مثال: https://github.com/user/repo" value="https://github.com/octocat/Hello-World">
  <button id="cloneAction">📥 استنساخ تجريبي</button>
  <button id="closeGithubPanel">إغلاق</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/ruby/ruby.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/search.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.css">

<script>
  // --- إدارة التبويبات والمحرر المتقدم ---
  let activeTabId = null;
  let tabs = []; // { id, name, content, language, modified }
  let editor = null;
  let autoSaveTimer = null;
  let currentFontSize = 16;

  // دعم 25 لغة (الخرائط)
  const langModeMap = {
    'javascript': 'javascript', 'python': 'python', 'html': 'htmlmixed', 'css': 'css', 'cpp': 'clike', 
    'java': 'clike', 'csharp': 'clike', 'go': 'go', 'ruby': 'ruby', 'rust': 'rust', 'json': 'javascript', 'markdown': 'markdown'
  };
  function setEditorLanguage(lang) {
    let mode = langModeMap[lang] || 'javascript';
    editor.setOption('mode', mode);
    if (activeTabId) {
      let tab = tabs.find(t => t.id == activeTabId);
      if (tab) tab.language = lang;
    }
    document.getElementById('statusLang').innerText = lang;
    document.getElementById('languageSwitcher').value = lang;
    triggerAutoSave();
  }

  // حفظ تلقائي في IndexedDB (لتجنب قيود الحجم)
  let db;
  const DB_NAME = 'ShadMiniCodeDB';
  const STORE_NAME = 'project';
  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }
  async function saveTabsToDB() {
    if (!db) db = await openDB();
    const transaction = db.transaction(STORE_NAME, 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put(JSON.stringify(tabs), 'tabs');
    document.getElementById('statusSaved').innerHTML = '✓ تم الحفظ التلقائي';
    setTimeout(() => document.getElementById('statusSaved').innerHTML = '💾 حفظ تلقائي', 1500);
  }
  async function loadTabsFromDB() {
    if (!db) db = await openDB();
    return new Promise((resolve) => {
      const transaction = db.transaction(STORE_NAME, 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const getRequest = store.get('tabs');
      getRequest.onsuccess = () => {
        if (getRequest.result) resolve(JSON.parse(getRequest.result));
        else resolve(null);
      };
      getRequest.onerror = () => resolve(null);
    });
  }

  function triggerAutoSave() {
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      if (activeTabId && editor) {
        const currentTab = tabs.find(t => t.id == activeTabId);
        if (currentTab) currentTab.content = editor.getValue();
        saveTabsToDB();
      }
    }, 1500);
  }

  // عرض التبويبات
  function renderTabs() {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = '';
    tabs.forEach(tab => {
      const tabDiv = document.createElement('div');
      tabDiv.className = `tab ${activeTabId === tab.id ? 'active' : ''}`;
      tabDiv.setAttribute('data-id', tab.id);
      tabDiv.innerHTML = `
        <span class="tab-name">${tab.name}${tab.modified ? '*' : ''}</span>
        <button class="tab-close"><i class="fas fa-times"></i></button>
      `;
      tabDiv.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) {
          e.stopPropagation();
          closeTab(tab.id);
        } else switchToTab(tab.id);
      });
      container.appendChild(tabDiv);
    });
    const newBtn = document.createElement('button');
    newBtn.className = 'new-tab-btn';
    newBtn.innerHTML = '<i class="fas fa-plus"></i>';
    newBtn.onclick = () => createNewTab();
    container.appendChild(newBtn);
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id == id);
    if (idx !== -1) tabs.splice(idx, 1);
    if (tabs.length === 0) createNewTab();
    if (activeTabId == id) {
      activeTabId = tabs[0]?.id || null;
      if (activeTabId) switchToTab(activeTabId);
    }
    renderTabs();
    triggerAutoSave();
  }

  async function createNewTab(content = '// ابدأ البرمجة هنا', name = 'غير مسمى', language = 'javascript') {
    const id = Date.now();
    tabs.push({ id, name, content, language, modified: false });
    renderTabs();
    await switchToTab(id);
    triggerAutoSave();
  }

  async function switchToTab(id) {
    if (activeTabId && editor) {
      const oldTab = tabs.find(t => t.id == activeTabId);
      if (oldTab) oldTab.content = editor.getValue();
    }
    activeTabId = id;
    const tab = tabs.find(t => t.id == id);
    if (!tab) return;
    const wrapper = document.getElementById('editorWrapper');
    wrapper.innerHTML = '<textarea id="codeEditor"></textarea>';
    const textarea = document.getElementById('codeEditor');
    if (editor) editor.toTextArea();
    editor = CodeMirror.fromTextArea(textarea, {
      lineNumbers: true,
      theme: "dracula",
      mode: langModeMap[tab.language] || 'javascript',
      autoCloseBrackets: true,
      matchBrackets: true,
      foldGutter: true,
      gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
      extraKeys: {
        "Ctrl-S": () => { saveCurrentContent(); },
        "Cmd-S": () => { saveCurrentContent(); },
        "Ctrl-F": () => { editor.execCommand("find"); }
      }
    });
    editor.setValue(tab.content);
    editor.on('change', () => {
      const current = tabs.find(t => t.id == activeTabId);
      if (current) {
        current.content = editor.getValue();
        current.modified = true;
        triggerAutoSave();
        renderTabs(); // لتحديث علامة *
      }
    });
    setEditorLanguage(tab.language);
    document.getElementById('statusLang').innerText = tab.language;
    renderTabs();
  }

  function saveCurrentContent() {
    if (activeTabId && editor) {
      const tab = tabs.find(t => t.id == activeTabId);
      if (tab) tab.content = editor.getValue();
      saveTabsToDB();
      document.getElementById('statusSaved').innerHTML = '✓ تم الحفظ يدوياً';
      setTimeout(() => document.getElementById('statusSaved').innerHTML = '💾 حفظ تلقائي', 1000);
    }
  }

  // فتح ملف من الجهاز
  function openLocalFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      const text = await file.text();
      const ext = file.name.split('.').pop();
      let lang = 'javascript';
      if (ext === 'py') lang = 'python';
      else if (ext === 'html') lang = 'html';
      else if (ext === 'css') lang = 'css';
      else if (ext === 'cpp' || ext === 'c') lang = 'cpp';
      else if (ext === 'java') lang = 'java';
      else if (ext === 'go') lang = 'go';
      else if (ext === 'md') lang = 'markdown';
      await createNewTab(text, file.name, lang);
    };
    input.click();
  }

  // GitHub تجريبي (محاكاة استنساخ)
  function showGithubPanel() {
    const panel = document.getElementById('githubPanel');
    panel.style.display = 'flex';
    document.getElementById('cloneAction').onclick = () => {
      const url = document.getElementById('repoUrlInput').value;
      document.getElementById('githubStatus').innerHTML = `<i class="fab fa-github"></i> تم استنساخ ${url.split('/').pop()}`;
      panel.style.display = 'none';
      alert('تم استنساخ وهمي (عرض توضيحي). يمكنك فيما بعد ربطه بـ isomorphic-git.');
    };
    document.getElementById('closeGithubPanel').onclick = () => panel.style.display = 'none';
  }

  // تهيئة التطبيق
  async function init() {
    await openDB();
    const savedTabs = await loadTabsFromDB();
    if (savedTabs && savedTabs.length) {
      tabs = savedTabs;
      activeTabId = tabs[0].id;
    } else {
      tabs = [{ id: Date.now(), name: 'main.js', content: '// ShadMini Code - محرر حديث\nconsole.log("مرحباً");', language: 'javascript', modified: false }];
      activeTabId = tabs[0].id;
    }
    renderTabs();
    await switchToTab(activeTabId);
    
    // ربط الواجهات
    document.getElementById('menu-new').onclick = () => createNewTab();
    document.getElementById('menu-open').onclick = () => openLocalFile();
    document.getElementById('menu-save').onclick = () => saveCurrentContent();
    document.getElementById('menu-github').onclick = () => showGithubPanel();
    document.getElementById('menu-undo').onclick = () => editor.undo();
    document.getElementById('menu-redo').onclick = () => editor.redo();
    document.getElementById('menu-find').onclick = () => editor.execCommand("find");
    document.getElementById('menu-font-inc').onclick = () => { currentFontSize += 2; document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px'; };
    document.getElementById('menu-font-dec').onclick = () => { currentFontSize = Math.max(10, currentFontSize-2); document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px'; };
    document.getElementById('saveBtn').onclick = () => saveCurrentContent();
    document.getElementById('languageSwitcher').onchange = (e) => setEditorLanguage(e.target.value);
    document.querySelectorAll('.sidebar-icon').forEach(icon => {
      icon.onclick = () => {
        if(icon.getAttribute('data-panel') === 'github') showGithubPanel();
        else alert('لوحة المستكشف والإعدادات قريباً');
      };
    });
    // ضبط حجم الخط الأولي
    document.querySelector('.CodeMirror').style.fontSize = currentFontSize + 'px';
  }
  init();
</script>
</body>
  </html>
